services:
  - type: web
    name: ai-threat-detection-soc
    runtime: python
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && python download_dataset.py && python train_model.py"
    startCommand: "gunicorn backend_final:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.3"
      - key: GEMINI_API_KEY
        sync: false
      - key: IPSTACK_API_KEY
        sync: false
